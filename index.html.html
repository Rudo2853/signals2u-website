<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Signals2U | Smart Signals. Better Decisions.</title>

<style>

:root{
    --blue:#03152D;
    --green:#66C321;
    --white:#FFFFFF;
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{

    background:var(--blue);

    font-family:Segoe UI, Arial, sans-serif;

    color:white;

    min-height:100vh;

    display:flex;
    justify-content:center;
    align-items:center;

    text-align:center;
}

.container{

    width:100%;
    max-width:1100px;

    padding:40px;

}

.logo{

    width:100%;
    max-width:650px;

    margin-bottom:30px;

}

.tagline{

    color:var(--green);

    font-size:2rem;
    font-weight:700;

    margin-bottom:35px;
}

.description{

    max-width:900px;

    margin:auto;

    font-size:1.5rem;

    line-height:1.8;

    color:#E5E7EB;

}

.button{

    margin-top:55px;

    display:inline-block;

    background:var(--green);

    color:var(--blue);

    padding:18px 48px;

    border-radius:999px;

    font-weight:700;

    font-size:1.4rem;

    text-decoration:none;

    box-shadow:0 0 25px rgba(102,195,33,.25);
}

.footer{

    margin-top:90px;

    color:#9CA3AF;

    font-size:1rem;

}

@media(max-width:768px){

    .logo{
        max-width:90%;
    }

    .tagline{
        font-size:1.5rem;
    }

    .description{
        font-size:1.1rem;
    }

}

</style>

</head>

<body>

<div class="container">

    <img src="logo.png" alt="Signals2U" class="logo">

    <div class="tagline">
        Smart Signals. Better Decisions.
    </div>

    <div class="description">
        Discover high-quality stock opportunities through intelligent buy and sell signals,
        sector rotation analysis, market insights, and AI-powered rankings.
    </div>

    <div class="button">
        Launching Soon
    </div>

    <div class="footer">
        © 2026 Signals2U. All Rights Reserved.
    </div>

</div>

</body>
</html>
